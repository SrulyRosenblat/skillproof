# skillproof default config. Secrets go in .env / environment, never here.
seed: 42

embedding:
  provider: openrouter        # openrouter | openai | local (local needs: pip install 'skillproof[local-embeddings]')
  model: google/gemini-embedding-2

clustering:
  k_benchmarks: 5             # how many benchmarks (most-dissimilar clusters) per skill
  k_range: [2, 10]            # k-means sweep range; best silhouette wins

codex:
  backend: claude             # codex | claude (headless `claude -p`)
  binary: /Users/srulyrosenblat/.local/bin/codex   # newer CLI; brew's 0.46 is too old for gpt-5.4
  claude_binary: claude
  model: sonnet               # claude backend: sonnet; codex backend: null = CLI default
  max_attempts: 3             # authoring attempts before FAILED.md
  timeout_seconds: 900

judge:                        # LLM judge panel for grader yes/no questions
  models:                     # majority vote; diverse families reduce blind spots
    - openai/gpt-5-nano
    - google/gemini-2.5-flash-lite
    - qwen/qwen3-vl-30b-a3b-instruct
  max_questions: 10

sandbox:
  image: skillproof-sandbox:latest
  mem_limit: 2g
  cpus: 2
  pids_limit: 256

eval:
  models:                     # OpenRouter model ids
    - moonshotai/kimi-k2.7-code
    - deepseek/deepseek-v4-flash
    - qwen/qwen3.6-35b-a3b
  trials: 3                   # per (model, benchmark, arm)
  max_turns: 30
  agent_wall_seconds: 600
  temperature: 0.0
  top_p: 1.0
  max_tokens: 8192
  api_retries: 5
  error_policy: fail          # fail = errored trial counts as failure | exclude
  parallel: 1
  # provider:                 # optional: pin OpenRouter upstream for determinism
  #   order: ["openai"]
  #   allow_fallbacks: false

benchmarks_dir: benchmarks
results_dir: results
