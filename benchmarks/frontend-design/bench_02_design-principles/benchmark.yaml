skill_name: frontend-design
title: Hero thesis, deliberate typography, and non-decorative structure for a non-sequential
  product set
capability: Given a product brief for three items explicitly not sold as a ranked
  set or sequence, the model must ground the hero in the brand's own material rather
  than a generic tagline, pair distinct display/body typefaces deliberately, and label
  the items by information that is actually true of each one (e.g. its heat level)
  instead of defaulting to numbered/step markers that imply an order the content does
  not have.
